services:
  db:
    restart: "no"
    ports:
      - "${POSTGRES_PORT_EXT?Variable not set}:${POSTGRES_PORT?Variable not set}"
    networks:
      - tpii-network

  users-service:
    restart: "no"
    ports:
      - "${SERVICE_PORT_EXT?Variable not set}:8000"
    build: .
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        - path: .
          action: sync
          target: /app
          ignore:
            - .venv
        - path: ./pyproject.toml
          action: rebuild
    volumes:
      - ./htmlcov:/app/htmlcov
    labels:
      - "traefik.http.routers.google.rule=PathPrefix(`/api/v1/google`)"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/v1/auth`)"
      - "traefik.http.routers.users.rule=PathPrefix(`/api/v1/users`)"
      - "traefik.http.routers.authentication.rule=PathPrefix(`/api/v1/authentication`)"
    networks:
      - tpii-network
      
networks:
  tpii-network:
    external: true